<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="IMC.css">
    <link rel="shortcut icon" href="calculadora (1).png" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bitcount+Prop+Double+Ink:wght@100..900&family=Gelasio:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
    <title>Calculadora de IMC</title>
</head>
<body>


    <div class="Calculadora">
   
        
            <div class="cabecalho">
                <h1>Calculadora de IMC</h1>
            </div>
            <div class="CorpoTexto">
                <label for="nome">Nome:</label>
                <input type="text" id="nome" required>
                <label for="altura">Altura:</label>
                <input type="text" id="altura" required>
                <label for="peso">Peso:</label>
                <input type="text" id="peso" required>
            </div>
            
             <div class="res" id="res"></div>
             


          

            <button id="calcular">Calcular</button>
            </div>

    
    
</body>
<script src="IMC.js"></script>
</html>
